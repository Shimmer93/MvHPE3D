name: "stage3_temporal_refine_joint_train"

data:
  config: "configs/data/humman_stage3.yaml"

model:
  config: "configs/model/stage3_temporal_refine_joint_train.yaml"

loss:
  pose_6d_weight: 1.0
  betas_weight: 0.0
  joint_weight: 1.0
  articulation_weight: 0.1
  pose_residual_weight: 0.05
  betas_residual_weight: 0.0
  stage2_aux_weight: 0.25

optimizer:
  learning_rate: 0.0005
  weight_decay: 0.00001
  stage2_backbone_lr_scale: 0.2

trainer:
  config: "configs/trainer/default.yaml"
  gradient_clip_val: 0.5
  gradient_clip_algorithm: "norm"
