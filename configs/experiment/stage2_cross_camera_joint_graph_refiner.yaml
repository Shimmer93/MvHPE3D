name: "stage2_cross_camera_joint_graph_refiner"

data:
  config: "configs/data/humman_stage2.yaml"

model:
  config: "configs/model/stage2_joint_graph_refiner.yaml"

loss:
  pose_6d_weight: 1.0
  betas_weight: 0.1
  joint_weight: 1.0
  articulation_weight: 0.1
  init_pose_6d_weight: 0.25
  init_betas_weight: 0.025

optimizer:
  learning_rate: 0.0005
  weight_decay: 0.00001

trainer:
  config: "configs/trainer/default.yaml"
