name: "stage2r_rgb_guided_residual_refiner_joint_train"

data:
  config: "configs/data/humman_stage2.yaml"

model:
  config: "configs/model/stage2r_rgb_guided_residual_refiner_joint_train.yaml"

loss:
  pose_6d_weight: 0.1
  betas_weight: 0.1
  joint_weight: 1.0
  articulation_weight: 0.1
  init_pose_6d_weight: 0.25
  init_betas_weight: 0.025
  pose_residual_weight: 0.05
  stage2_aux_weight: 0.25

optimizer:
  learning_rate: 0.0003
  weight_decay: 0.00001
  stage2_backbone_lr_scale: 0.2

trainer:
  config: "configs/trainer/default.yaml"
  gradient_clip_val: 0.5
  gradient_clip_algorithm: "norm"
